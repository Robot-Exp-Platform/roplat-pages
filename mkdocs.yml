site_name: Roplat Documentation

nav:
  - 首页: index.md
  - Introduction: 01 Introduction.md
  - 新手学习路线: 02 新手学习路线.md
  - 概念讲解:
    - 概念导读: Concepts/00 概念导读.md
    - 节点与消息: Concepts/01 节点与消息.md
    - 节律与系统: Concepts/02 节律与系统.md
    - 通讯与数据模型: Concepts/03 通讯与数据模型.md
  - 快速开始:
    - 快速开始总览: QuickStart/00 快速开始总览.md
    - 从零创建 Rust 项目: QuickStart/01 从零创建 Rust 项目.md
    - 扩展 C++ 节点: QuickStart/02 扩展 C++ 节点.md
    - 扩展 Python 节点: QuickStart/03 扩展 Python 节点.md
    - 实现数据互通: QuickStart/04 实现数据互通.md
    - 编译与发布使用: QuickStart/05 编译与发布使用.md
    - 路径排错实验库: QuickStart/06 路径排错实验库.md
  - 变更日志:
    - 2026-04-12 新手文档首版: Log/2026-04-12_newbie_user_docs_bootstrap.md

theme:
  logo: asserts/icon.png
  favicon: asserts/icon.png
  name: material
  features:
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - navigation.footer
  icon:
    repo: fontawesome/brands/git-alt
  palette:
    # Palette toggle for light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh
          default: true
          name: 简体中文
          build: true
        - locale: en
          name: English
          build: true
  - git-authors:
      show_contribution: true
      show_line_count: true

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - attr_list
  - md_in_html
  - attr_list
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

copyright: 内部使用，切勿外传

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css

extra:
  status:
    <identifier>: <description>
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page by
            using our <a href="..." target="_blank" rel="noopener">feedback form</a>.
